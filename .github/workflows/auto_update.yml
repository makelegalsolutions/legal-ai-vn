name: Auto Daily Legal RAG Update

on:
  schedule:
    - cron: '0 0 * * *'  # 7h sáng giờ VN
  workflow_dispatch:

jobs:
  rag-update-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn dự án
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài đặt các thư viện hệ thống
        run: |
          pip install --upgrade pip
          pip install faiss-cpu sentence-transformers \
                      google-api-python-client google-auth \
                      numpy

      - name: Khởi chạy tập lệnh cập nhật Vector FAISS
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python update_index.py

      - name: Lưu file .faiss và metadata lên GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add legal_index.faiss metadata.json
          git diff --staged --quiet || git commit -m "bot: cập nhật vector và metadata mới" && git push
