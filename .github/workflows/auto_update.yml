name: Auto Daily Legal RAG Update

on:
  schedule:
    - cron: '0 19 * * *' # Tự động chạy vào 2h00 sáng mỗi đêm
  workflow_dispatch: # Lệnh bắt buộc để hiện nút bấm chạy bằng tay thủ công

jobs:
  crawl-and-rag-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn dự án
        uses: actions/checkout@v3

      - name: Cài đặt môi trường Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cài đặt các thư viện hệ thống
        run: |
          pip install -r requirements.txt
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib beautifulsoup4 requests

      - name: Chạy Bot thu thập văn bản mới từ Công Báo
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python crawl_congbao.py

      - name: Khởi chạy tập lệnh cập nhật Vector FAISS
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python update_data.py

      - name: Tự động ghi đè lưu trữ file .faiss và metadata mới lên GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add legal_index.faiss metadata.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: tự động đồng bộ hóa dữ liệu công báo mới" && git push)
