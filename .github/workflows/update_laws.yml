name: Update Legal Documents

on:

  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:


jobs:

  update-laws:

    runs-on: ubuntu-latest

    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

    steps:

      # ====================================
      # CHECKOUT REPOSITORY
      # ====================================

      - name: Checkout repository
        uses: actions/checkout@v4


      # ====================================
      # SETUP PYTHON
      # ====================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      # ====================================
      # INSTALL REQUIREMENTS
      # ====================================

      - name: Install requirements
        run: |
          pip install -r requirements.txt


      # ====================================
      # CREATE SERVICE ACCOUNT FILE
      # ====================================

      - name: Create service account file
        shell: bash
        run: |
          printf '%s' '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > service_account.json


      # ====================================
      # DEBUG SERVICE ACCOUNT FILE
      # ====================================

      - name: Debug service account file
        run: |
          echo "===== FIRST 5 LINES ====="
          head -n 5 service_account.json

          echo ""
          echo "===== FILE SIZE ====="
          wc -c service_account.json


      # ====================================
      # RUN VALIDATION PIPELINE
      # ====================================

      - name: Run validation pipeline
        run: |
          python pipeline/validate_pipeline.py
