name: Update Legal Documents

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild (ignore incremental)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

jobs:
  update-laws:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pypdf2 python-docx pydrive2 sentence-transformers faiss-cpu google-generativeai beautifulsoup4

      - name: Create service account file
        run: |
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > service_account.json

      - name: Run validation pipeline
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python pipeline/validate_pipeline.py

      - name: Run text processing
        run: python pipeline/text_processing.py

      - name: Run chunking pipeline
        run: python pipeline/chunking_pipeline.py

      - name: Run vector pipeline
        run: python pipeline/vector_pipeline.py

      - name: Test search
        run: python pipeline/search_pipeline.py || echo "Search test skipped (no vectorstore yet)"

      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # QUAN TRỌNG: Xóa service_account.json trước khi commit
          rm -f service_account.json
          
          # Chỉ commit thư mục data (không chứa secrets)
          git add data/
          
          if git diff --staged --quiet; then
            echo "📭 No changes to commit"
          else
            git commit -m "🤖 Auto update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Changes pushed successfully"
          fi
      
      - name: Clean up sensitive file
        if: always()
        run: rm -f service_account.json
