name: Update Legal Documents

on:

  # Chạy tự động mỗi 30 phút
  schedule:
    - cron: '*/30 * * * *'

  # Cho phép chạy thủ công
  workflow_dispatch:


jobs:

  update-laws:

    runs-on: ubuntu-latest

    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

    steps:

      # ====================================
      # Checkout Repository
      # ====================================

      - name: Checkout repository
        uses: actions/checkout@v4


      # ====================================
      # Setup Python
      # ====================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      # ====================================
      # Install Requirements
      # ====================================

      - name: Install requirements
        run: |
          pip install -r requirements.txt


      # ====================================
      # Create Google Service Account File
      # ====================================

      - name: Create service account file
        run: |
          cat <<EOF > service_account.json
          ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          EOF


      # ====================================
      # Run Validation Pipeline
      # ====================================

      - name: Run validation pipeline
        run: |
          python pipeline/validate_pipeline.py
